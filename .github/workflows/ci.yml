name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api-server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install shared protocol dependencies
        run: npm --prefix ./shared-protocol install --package-lock=false

      - name: Install API server dependencies
        run: npm --prefix ./api-server ci

      - name: Install game server dependencies
        run: npm --prefix ./game-server install --package-lock=false

      - name: Run full build verification
        run: npm run check:all
