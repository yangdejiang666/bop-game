services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/001_init.sql:/docker-entrypoint-initdb.d/010_schema.sql:ro
      - ../../database/003_enterprise_app_foundation.sql:/docker-entrypoint-initdb.d/020_enterprise_app_foundation.sql:ro
      - ../../database/004_auth_communications.sql:/docker-entrypoint-initdb.d/030_auth_communications.sql:ro
      - ../../database/005_lobby_modes.sql:/docker-entrypoint-initdb.d/040_lobby_modes.sql:ro

  api-server:
    build:
      context: ../..
      dockerfile: deploy/oracle-vm/api-server.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      PUBLIC_GAME_WS_URL: ${PUBLIC_GAME_WS_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    expose:
      - "${API_PORT}"
    ports:
      - "${PUBLIC_API_PORT:-8788}:${API_PORT}"

  game-server:
    build:
      context: ../..
      dockerfile: deploy/oracle-vm/game-server.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      GAME_HOST: ${GAME_HOST}
      GAME_PORT: ${GAME_PORT}
      GAME_WS_PATH: ${GAME_WS_PATH}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: ${LOG_LEVEL}
    expose:
      - "${GAME_PORT}"
    ports:
      - "${PUBLIC_GAME_PORT:-8899}:${GAME_PORT}"

  caddy:
    build:
      context: ../..
      dockerfile: deploy/oracle-vm/caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      - api-server
      - game-server
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
